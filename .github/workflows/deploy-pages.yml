name: Deploy web app to GitHub Pages

# Builds the Next.js app under `web/` as a static export and publishes
# the result to GitHub Pages. Triggered on every push to `main` and
# manually via the Actions tab.
#
# Prereqs (one-time setup in the repository):
#   Settings → Pages → "Build and deployment" → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to Pages and authenticate via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. Don't cancel an in-flight deploy if a
# new push lands — the next one waits its turn.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          # Repo name → URL prefix on github.io. If the repo is renamed,
          # update this string (and re-deploy). Picked up by next.config.mjs
          # AND by Module.ts at runtime via process.env.NEXT_PUBLIC_BASE_PATH.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Disable Jekyll
        # GH Pages otherwise ignores files starting with `_` (e.g. `_next/`).
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
